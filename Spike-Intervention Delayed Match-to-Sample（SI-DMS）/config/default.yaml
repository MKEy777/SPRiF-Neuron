task:
  dt_ms: 5
  pre_ms: 50
  cue_ms: 100
  input_size: 30
  cue_channels: 10
  cue_rate_hz: 40.0
  noise_rate_hz: 10.0
  intervention_fraction: 0.10
  intervention_margin: 0.05
  train_delays_ms: [200, 400, 800, 1600]
  eval_delays_ms: [200, 400, 800, 1600, 2500]
  train_intervention_counts: [0, 1, 2, 4]
  eval_intervention_counts: [0, 1, 2, 4, 8]
model:
  hidden_size: 64
  recurrent: false
  threshold: 1.0
  output_tau_ms: 20.0
train:
  steps: 1000
  batch_size: 256
  learning_rate: 0.005
  rate_target: 0.10
  rate_weight: 0.05
  grad_clip: 1.0
  seeds: [1,2,3]
  device: auto
